<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Báo cáo Vận hành XK Gạo — AAN</title>
<style>
  html,body{height:100%;margin:0;background:#0a100a;color:#dee4da;
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
  .spin{width:34px;height:34px;border:3px solid rgba(67,182,73,.25);border-top-color:#43b649;
    border-radius:50%;animation:s 1s linear infinite;}
  @keyframes s{to{transform:rotate(360deg)}}
  .t{font-size:13px;letter-spacing:.3px;opacity:.85}
  a{color:#43b649}
</style>
</head>
<body>
<div class="wrap">
  <div class="spin"></div>
  <div class="t">Đang chuyển tới báo cáo mới nhất…</div>
  <noscript><a href="2026-06-12.html">Mở báo cáo mới nhất</a></noscript>
</div>
<script>
/* Trang chủ: luôn redirect sang ngày mới nhất trong reports.json.
   Chỉ cần cập nhật reports.json mỗi ngày, không phải sửa file này. */
(async () => {
  // fallback tĩnh nếu fetch lỗi (ví dụ mở bằng file://)
  var fallback = '2026-06-12.html';
  try {
    var res = await fetch('reports.json', { cache: 'no-store' });
    var days = await res.json();
    if (Array.isArray(days) && days.length) {
      // reports.json đã sắp xếp giảm dần → phần tử đầu là mới nhất.
      // Vẫn sort lại phòng trường hợp thứ tự không chuẩn.
      var latest = days.slice().sort().reverse()[0];
      location.replace(latest + '.html');
      return;
    }
  } catch (e) {
    console.warn('reports.json?', e);
  }
  location.replace(fallback);
})();
</script>
</body>
</html>
